<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Org chart / people icon in white -->
  <!-- Top circle (head node) -->
  <circle cx="32" cy="16" r="6" fill="white"/>
  <!-- Connecting lines -->
  <line x1="32" y1="22" x2="32" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="30" x2="18" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="30" x2="46" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="18" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="30" x2="46" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom left circle -->
  <circle cx="18" cy="42" r="6" fill="white"/>
  <!-- Bottom right circle -->
  <circle cx="46" cy="42" r="6" fill="white"/>
  <!-- Speed line below to suggest "Quick" -->
  <rect x="22" y="53" width="20" height="3" rx="1.5" fill="white" opacity="0.5"/>
</svg>